<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in to your account</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Adding these specific tweaks for the password transition */
        .identity {
            display: block;
            margin-bottom: 16px;
            font-size: 15px;
            color: #1b1b1b;
        }
        .back-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0 8px 0 0;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="outer-container">
        <div class="login-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg" alt="Microsoft" class="ms-logo">
            
            <div id="email-section">
                <h1>Sign in</h1>
                <input type="email" id="user-email" placeholder="Email, phone, or Skype" class="input-field" spellcheck="false">
                <p class="help-text">No account? <a href="#">Create one!</a></p>
                <p class="help-text"><a href="#">Can’t access your account?</a></p>
                <div class="button-row">
                    <button class="btn-next" onclick="showPassword()">Next</button>
                </div>
            </div>

            <div id="password-section" style="display: none;">
                <div class="identity">
                    <button class="back-btn" onclick="showEmail()">
                        <img src="https://aadcdn.msauth.net/shared/1.0/content/images/arrow_left_7cc096da6aa2dba3f81fcc1c8262157c.svg" width="20">
                    </button>
                    <span id="display-email"></span>
                </div>
                <h1>Enter password</h1>
                <input type="password" id="user-password" placeholder="Password" class="input-field">
                <p class="help-text"><a href="#">Forgot password?</a></p>
                <div class="button-row">
                    <button class="btn-next" onclick="finishLogin()">Sign in</button>
                </div>
            </div>
        </div>

        <div class="options-box">
            <img src="https://aadcdn.msauth.net/shared/1.0/content/images/signin-options_4e48046ce74f4b89d45037c90576bfac.svg" class="key-icon">
            <span>Sign-in options</span>
        </div>

        <div class="footer">
            <a href="#">Terms of use</a>
            <a href="#">Privacy & cookies</a>
            <span>...</span>
        </div>
    </div>

    <script>
        // Handle "Enter" key for better UX
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                if (document.getElementById('email-section').style.display !== 'none') {
                    showPassword();
                } else {
                    finishLogin();
                }
            }
        });

        function showPassword() {
            const email = document.getElementById('user-email').value;
            if(!email) {
                document.getElementById('user-email').style.borderBottom = "2px solid #d92d20";
                return;
            }
            document.getElementById('email-section').style.display = 'none';
            document.getElementById('password-section').style.display = 'block';
            document.getElementById('display-email').innerText = email;
            document.getElementById('user-password').focus();
        }

        function showEmail() {
            document.getElementById('password-section').style.display = 'none';
            document.getElementById('email-section').style.display = 'block';
            document.getElementById('user-email').focus();
        }

        function finishLogin() {
            const pass = document.getElementById('user-password').value;
            if(pass) alert("Perfect match! Proceeding...");
        }
    </script>
</body>
</html>
