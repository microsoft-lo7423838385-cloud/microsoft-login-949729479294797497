<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in to your account</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg" alt="Microsoft" class="logo">
            
            <h1>Sign in</h1>
            <input type="email" placeholder="Email, phone, or Skype" class="input-field">
            
            <p class="account-help">No account? <a href="#">Create one!</a></p>
            <p class="account-help"><a href="#">Can’t access your account?</a></p>
            
            <div class="button-group">
                <button class="btn-primary">Next</button>
            </div>
        </div>
    </div>
</body>
</html>
