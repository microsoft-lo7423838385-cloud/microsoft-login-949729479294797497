<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in to your account</title>
    <style>
        /* --- RESET & BASE --- */
        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: url('https://aadcdn.msauth.net/shared/1.0/content/images/backgrounds/2_bc3d32a696895f78c19df6c717586a5d.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #1b1b1b;
        }

        /* --- LAYOUT --- */
        .outer-container {
            width: 440px;
            animation: fadeIn 0.3s ease-out;
        }

        .login-card {
            background: #ffffff;
            padding: 44px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
            margin-bottom: 28px;
            min-height: 376px;
            position: relative;
        }

        /* --- COMPONENTS --- */
        .ms-logo {
            width: 108px;
            height: 24px;
            margin-bottom: 24px;
            display: block;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin: 0 0 16px 0;
            letter-spacing: -0.01em;
        }

        /* Identity Row (The "Secret Sauce" fix) */
        .identity-container {
            display: flex;
            align-items: center;
            padding: 4px;
            margin-bottom: 12px;
            cursor: pointer;
            border-radius: 2px;
            margin-left: -8px; /* Perfectly aligns arrow with logo */
            transition: background 0.1s;
        }

        .identity-container:hover {
            background-color: rgba(0, 0, 0, 0.05);
        }

        .back-btn-img {
            width: 24px;
            height: 24px;
            margin-right: 8px;
        }

        #display-email {
            font-size: 15px;
            color: #1b1b1b;
            text-overflow: ellipsis;
            overflow: hidden;
            white-space: nowrap;
        }

        /* Input Styling */
        .input-field {
            width: 100%;
            border: none;
            border-bottom: 1px solid #666;
            padding: 8px 0;
            font-size: 16px;
            margin-bottom: 12px;
            outline: none;
            font-family: inherit;
            transition: border-bottom 0.1s ease-in;
        }

        .input-field:focus {
            border-bottom: 2px solid #0067b8;
        }

        .help-text {
            font-size: 13px;
            margin: 12px 0;
            color: #1b1b1b;
        }

        .help-text a {
            color: #0067b8;
            text-decoration: none;
        }

        .help-text a:hover {
            text-decoration: underline;
        }

        /* Buttons */
        .button-row {
            display: flex;
            justify-content: flex-end;
            margin-top: 40px;
        }

        .btn-next {
            background-color: #0067b8;
            color: #ffffff;
            border: none;
            padding: 8px 32px;
            font-size: 15px;
            cursor: pointer;
            min-width: 108px;
        }

        .btn-next:hover {
            background-color: #005da6;
        }

        /* Sign-in Options Box */
        .options-box {
            background: #ffffff;
            padding: 12px 44px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .key-icon {
            width: 28px;
            height: 28px;
            margin-right: 12px;
            opacity: 0.7;
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 0;
            right: 0;
            padding: 12px 30px;
            font-size: 12px;
        }

        .footer a, .footer span {
            margin-left: 24px;
            text-decoration: none;
            color: #000;
            cursor: pointer;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="outer-container">
        <div class="login-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg" alt="Microsoft" class="ms-logo">
            
            <div id="email-section">
                <h1>Sign in</h1>
                <input type="email" id="user-email" placeholder="Email, phone, or Skype" class="input-field" spellcheck="false" autocomplete="email">
                <p class="help-text">No account? <a href="#">Create one!</a></p>
                <p class="help-text"><a href="#">Can’t access your account?</a></p>
                <div class="button-row">
                    <button class="btn-next" onclick="showPassword()">Next</button>
                </div>
            </div>

            <div id="password-section" style="display: none;">
                <div class="identity-container" onclick="showEmail()">
                    <img src="https://aadcdn.msauth.net/shared/1.0/content/images/arrow_left_7cc096da6aa2dba3f81fcc1c8262157c.svg" class="back-btn-img" alt="Back">
                    <div id="display-email"></div>
                </div>
                <h1>Enter password</h1>
                <input type="password" id="user-password" placeholder="Password" class="input-field">
                <p class="help-text"><a href="#">Forgot password?</a></p>
                <div class="button-row">
                    <button class="btn-next" onclick="finishLogin()">Sign in</button>
                </div>
            </div>
        </div>

        <div class="options-box" onclick="alert('Alternative sign-in options')">
            <img src="https://aadcdn.msauth.net/shared/1.0/content/images/signin-options_4e48046ce74f4b89d45037c90576bfac.svg" class="key-icon">
            <span>Sign-in options</span>
        </div>
    </div>

    <div class="footer">
        <a href="#">Terms of use</a>
        <a href="#">Privacy & cookies</a>
        <span>...</span>
    </div>

    <script>
        const emailSection = document.getElementById('email-section');
        const passwordSection = document.getElementById('password-section');
        const emailInput = document.getElementById('user-email');
        const passwordInput = document.getElementById('user-password');
        const displayEmail = document.getElementById('display-email');

        // Handle Enter key for seamless "copy" feel
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (emailSection.style.display !== 'none') showPassword();
                else finishLogin();
            }
        });

        function showPassword() {
            if (!emailInput.value) {
                emailInput.style.borderBottom = "2px solid #d92d20";
                return;
            }
            emailSection.style.display = 'none';
            passwordSection.style.display = 'block';
            displayEmail.innerText = emailInput.value;
            passwordInput.focus();
        }

        function showEmail() {
            passwordSection.style.display = 'none';
            emailSection.style.display = 'block';
            emailInput.focus();
        }

        function finishLogin() {
            if (passwordInput.value) {
                alert("Perfectly cloned! Ready for submission.");
            } else {
                passwordInput.style.borderBottom = "2px solid #d92d20";
            }
        }
    </script>
</body>
</html>
